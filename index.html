<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G-TAX AI Assistant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
  .chat-container { width: 420px; height: 600px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); display: flex; flex-direction: column; overflow: hidden; }
  .chat-header { background: #1a73e8; padding: 16px 20px; color: white; }
  .chat-header h3 { font-size: 16px; }
  .chat-header p { font-size: 12px; opacity: 0.85; margin-top: 2px; }
  .chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
  .message { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
  .bot-message { background: #f0f2f5; color: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 4px; }
  .user-message { background: #1a73e8; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
  .typing { background: #f0f2f5; padding: 10px 14px; border-radius: 12px; align-self: flex-start; display: none; }
  .typing span { display: inline-block; width: 8px; height: 8px; background: #999; border-radius: 50%; margin: 0 2px; animation: bounce 1s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
  .chat-input { padding: 12px 16px; border-top: 1px solid #eee; display: flex; gap: 8px; }
  .chat-input input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 24px; font-size: 14px; outline: none; }
  .chat-input input:focus { border-color: #1a73e8; }
  .chat-input button { background: #1a73e8; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
  .chat-input button:hover { background: #1557b0; }
  .quick-btns { padding: 0 16px 10px; display: flex; gap: 6px; flex-wrap: wrap; }
  .quick-btn { background: #e8f0fe; color: #1a73e8; border: none; padding: 6px 12px; border-radius: 16px; font-size: 12px; cursor: pointer; }
  .quick-btn:hover { background: #d2e3fc; }
</style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <h3>G-TAX AI Assistant</h3>
    <p>Online · Typically replies instantly</p>
  </div>

  <div class="chat-messages" id="messages">
    <div class="message bot-message">
      👋 Hello! I'm the G-TAX AI Assistant. I can help you with GST, Income Tax, Company Registration and more. How can I help you today?
    </div>
  </div>

  <div class="quick-btns">
    <button class="quick-btn" onclick="quickAsk('What is GST registration?')">GST Registration</button>
    <button class="quick-btn" onclick="quickAsk('How to file income tax?')">Income Tax</button>
    <button class="quick-btn" onclick="quickAsk('How to register a company?')">Company Reg</button>
  </div>

  <div class="typing" id="typing">
    <span></span><span></span><span></span>
  </div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Type your question..." onkeypress="handleKey(event)" />
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  const messagesDiv = document.getElementById('messages');
  const typingDiv = document.getElementById('typing');
  const input = document.getElementById('userInput');

  function addMessage(text, isUser) {
    const div = document.createElement('div');
    div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
    div.innerText = text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function showTyping() {
    typingDiv.style.display = 'block';
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function hideTyping() {
    typingDiv.style.display = 'none';
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    addMessage(text, true);
    showTyping();

    try {
      const response = await fetch('http://127.0.0.1:8000/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text })
      });
      const data = await response.json();
      hideTyping();
      addMessage(data.reply, false);
    } catch (error) {
      hideTyping();
      addMessage('Sorry, something went wrong. Please try again.', false);
    }
  }

  function quickAsk(question) {
    input.value = question;
    sendMessage();
  }

  function handleKey(event) {
    if (event.key === 'Enter') sendMessage();
  }
</script>
</body>
</html>
